name: bumditbul_mobile
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.1.0
  material_symbols_icons: ^4.2815.0
  flutter_riverpod: ^2.4.0
  go_router: ^13.0.0
  dio: ^5.3.0
  equatable: ^2.0.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/font/Inter-Medium.ttf
          weight: 500
        - asset: assets/font/Inter-Regular.ttf
          weight: 400
        - asset: assets/font/Inter-SemiBold.ttf
          weight: 600

  assets:
    - assets/images/